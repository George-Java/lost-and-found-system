services:
  mysql:
    image: mysql:8.4
    container_name: lostfound-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lostfound
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/lostfound.sql:/docker-entrypoint-initdb.d/01-lostfound.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: carterlucas/lostfound-backend:0.1.0
    container_name: lostfound-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/lostfound?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      LOSTFOUND_UPLOAD_DIR: /app/uploads
      TZ: Asia/Shanghai
    volumes:
      - uploads-data:/app/uploads
    expose:
      - "8080"

  frontend:
    image: carterlucas/lostfound-frontend:0.1.2

    container_name: lostfound-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
  uploads-data:
